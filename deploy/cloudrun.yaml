apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: talentiq-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"   # always-on CPU for ML inference
        run.googleapis.com/memory: "4Gi"
        run.googleapis.com/cpu: "2"
    spec:
      containerConcurrency: 4     # limit concurrent requests per instance
      timeoutSeconds: 300
      containers:
        - image: gcr.io/YOUR_PROJECT/talentiq-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: ENABLE_GEMINI
              value: "true"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: talentiq-secrets
                  key: gemini-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: talentiq-secrets
                  key: database-url
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
